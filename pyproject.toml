[project]
name = "2026-rebuilt"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "phoenix6>=26.1.1",
    "robotpy-pathplannerlib>=2026.1.2",
    "robotpy-rev",
    "robotpy[commands2]>=2026.2.1",
]

[dependency-groups]
dev = [
    "ruff>=0.11",
    "basedpyright>=1.29",
]

[tool.ruff]
target-version = "py314"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific
]

[tool.ruff.lint.per-file-ignores]
"generated/*" = ["ALL"]
"modules/limelight.py" = ["E501"]  # long docstrings in Limelight API
"subsystems/command_swerve_drivetrain.py" = ["SIM"]  # CTRE auto-generated

[tool.basedpyright]
pythonVersion = "3.14"
typeCheckingMode = "standard"
reportMissingModuleSource = false
reportAttributeAccessIssue = "warning"  # REV API stubs are incomplete
venvPath = "."
venv = ".venv"
exclude = ["generated", ".venv"]

[tool.robotpy]

# Version of robotpy this project depends on
robotpy_version = "2026.2.2"

# Which core WPILib components should be installed
# -> equivalent to `pip install robotpy[extra1, ...]
components = [
    # "all",
    # "apriltag",
    "commands2",
    # "cscore",
    # "romi",
    # "sim",
    # "xrp",
]

# Other pip packages to install (including vendor packages)
requires = [
    "phoenix6~=26.1",
    # "photonlibpy",
    # "robotpy-ctre",  # Phoenix 5
    # "robotpy-navx",
    "robotpy-pathplannerlib",
    # "robotpy-playingwithfusion",
    "robotpy-rev",
]
